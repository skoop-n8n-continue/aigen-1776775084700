<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Chronos Showcase</title>

  <!-- GSAP Core + Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/TextPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=t9r4e2">
</head>
<body>
  <div id="scene">
    <!-- Background Layer -->
    <div id="background"></div>
    <div id="overlay"></div>

    <!-- Decorative Gears -->
    <div class="gear-container gear-large">
      <img src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/skoop-n8n-continue%2Faigen-1776775084700%2Fassets%2Fluxury_gear_asset-1776775441082.png" alt="Gear" class="gear-img">
    </div>
    <div class="gear-container gear-small">
      <img src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/skoop-n8n-continue%2Faigen-1776775084700%2Fassets%2Fluxury_gear_asset-1776775441082.png" alt="Gear" class="gear-img">
    </div>

    <!-- Clock Elements -->
    <div id="clock-frame">
      <div id="clock-numbers"></div>
      <div id="hour-hand"></div>
      <div id="minute-hand"></div>
      <div id="second-hand"></div>
      <div id="clock-center"></div>
    </div>

    <!-- Product Showcase -->
    <div id="products-container">
      <!-- Products will be injected here -->
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer">
      <div id="brand">CHRONOS</div>
    </div>
  </div>

  <script src="animation.js?v=t9r4e2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
